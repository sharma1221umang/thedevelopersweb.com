<section id="contact" class="section contact-bg">
  <h2>Let's Build Your Business Website</h2>
  <p class="contact-intro">Tell us about your business goals and we'll recommend the best website solution for your budget and audience.</p>

  <form id="leadForm" class="form-grid">
    <div class="form-left">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="text" name="business" placeholder="Business Name">

      <select name="type">
        <option value="" disabled selected>Business Type</option>
        <option value="Salon">Salon</option>
        <option value="Gym">Gym</option>
        <option value="Restaurant">Restaurant</option>
        <option value="Shop">Shop</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-right">
      <select name="website">
        <option value="" disabled selected>Do you have a website?</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>

      <select name="revenue">
        <option value="" disabled selected>Monthly Revenue</option>
        <option value="Below 50K">Below &#8377;50K</option>
        <option value="50K - 1L">&#8377;50K - &#8377;1L</option>
        <option value="1L - 5L">&#8377;1L - &#8377;5L</option>
        <option value="Above 5L">Above &#8377;5L</option>
      </select>

      <select name="budget">
        <option value="" disabled selected>Your Budget</option>
        <option value="5K-10K">&#8377;5K - &#8377;10K</option>
        <option value="10K-25K">&#8377;10K - &#8377;25K</option>
        <option value="25K+">&#8377;25K+</option>
      </select>

      <button class="btn primary">Get Free Consultation</button>
      <p class="response-note">Response usually within 24 hours.</p>
    </div>
  </form>

  <iframe src="https://maps.google.com/maps?q=kachrauli%20panipat&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>
